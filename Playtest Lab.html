<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mortalis: Realms — Playtest Lab</title>
<style>
  body { margin: 0; background: #f4f2ec; font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; color: #1c1a16; }
  header { background: #1d2027; color: #e8e4d8; padding: 18px 28px; }
  header h1 { margin: 0; font-size: 20px; font-family: Georgia, serif; }
  header p { margin: 4px 0 0; font-size: 13px; color: #9daac6; }
  #controls { display: flex; gap: 12px; align-items: center; padding: 16px 28px; flex-wrap: wrap; background: #fff; border-bottom: 1px solid #ddd8ca; }
  button { font-size: 14px; padding: 8px 16px; border: 1px solid #c9c5b8; border-radius: 8px; background: #fff; cursor: pointer; }
  button:hover { background: #f0ede4; }
  button.primary { background: #1d2027; color: #fff; border-color: #1d2027; }
  button:disabled { opacity: 0.5; cursor: default; }
  input[type=number] { width: 70px; font-size: 14px; padding: 6px; border: 1px solid #c9c5b8; border-radius: 8px; }
  #progress { font-size: 13px; color: #55534b; }
  main { padding: 20px 28px; max-width: 1100px; }
  section { background: #fff; border: 1px solid #ddd8ca; border-radius: 10px; padding: 16px 20px; margin-bottom: 18px; }
  section h2 { margin: 0 0 4px; font-size: 16px; }
  section p.sub { margin: 0 0 12px; font-size: 12.5px; color: #6b6960; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { text-align: left; padding: 5px 10px; border-bottom: 1px solid #eee8da; vertical-align: top; }
  th { color: #6b6960; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .ok { color: #2e7d4f; } .warn { color: #b26a00; } .bad { color: #b3352c; }
  .pill { display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 10px; border: 1px solid #c9c5b8; margin-right: 4px; }
  .muted { color: #8a877c; }
  #summary { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
  .stat { background: #fff; border: 1px solid #ddd8ca; border-radius: 10px; padding: 12px 18px; min-width: 120px; }
  .stat .n { font-size: 24px; font-weight: 600; } .stat .l { font-size: 12px; color: #6b6960; }
</style>
</head>
<body>
<header>
  <h1>Mortalis: Realms — Playtest Lab</h1>
  <p>Runs full AI-vs-AI games at maximum speed and flags cards whose effects never behave the way their text says.</p>
</header>
<div id="controls">
  <label>Games: <input type="number" id="n-games" value="60" min="1" max="500"></label>
  <button class="primary" id="btn-run">Run playtest</button>
  <button id="btn-smoke">Run staged effect check</button>
  <span id="progress"></span>
</div>
<main>
  <div id="summary"></div>
  <div id="report"></div>
</main>

<script src="cards.js"></script>
<script src="rules.js"></script>
<script src="engine.js"></script>
<script src="smoke_test.js"></script>
<script>
/* ---------- isolated setup: never touch the real app's saved data ---------- */
window.UI = {
  render() {}, onLog() {}, toast() {}, freeTargeting: () => false,
  pickHero: async (msg, cands) => cands && cands.length ? cands[0] : null,
  pickHandCard: async () => null, pickOption: async () => 0,
};
window.confirm = () => true;
window.prompt = () => null;
DB = baseData();          // published card data, ignoring any local edits
recompileAll();
const origTimeout = window.setTimeout.bind(window);
window.setTimeout = (fn, ms) => origTimeout(fn, 0);   // AI thinks at full speed

const $ = id => document.getElementById(id);
const esc = s => String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;");

/* ---------- classification: which cards can prove themselves in logs ---------- */
// Pure auras / static flags never write log lines, so game telemetry can't judge
// them — the staged effect check covers those instead.
function silentByNature(c) {
  const f = fx(c.id);
  const loud = (f.sot || []).length || (f.eot || []).length || f.onEnter || f.onDeath || (f.listen || []).length ||
    (f.combatTrig || []).length || (f.activated || []).some(a => a.ops) || (f.auxActivated || []).some(a => a.ops) ||
    f.auxOnEnter || f.onDamaged || f.onEnemyDeath || f.onFriendlyDeath || f.preFight || f.auxPreFight ||
    f.spellOps && f.spellOps !== "manual" || f.rite || f.hexTrig;
  return !loud;
}

/* ---------- telemetry ---------- */
let stats = null;
function freshStats() {
  stats = { games: 0, crashes: [], perCard: {}, realms: {}, staged: null };
  for (const c of DB.cards) stats.perCard[c.id] = { name: c.name, realm: c.realm, type: c.type, played: 0, mentions: 0, games: 0, wins: 0 };
  for (const r of realmNames()) stats.realms[r] = { games: 0, wins: 0 };
}

// direct play instrumentation: record exactly who played which card
let PLAY_TRACK = null;
const _playHero = playHero, _playAux = playAux;
playHero = async function (pi, hi, li) { if (PLAY_TRACK) PLAY_TRACK[pi].add(G.players[pi].hand[hi]); return _playHero(pi, hi, li); };
playAux = async function (pi, hi, li) { if (PLAY_TRACK) PLAY_TRACK[pi].add(G.players[pi].hand[hi]); return _playAux(pi, hi, li); };
for (const fn of ["playRelic", "setHex", "playRite"]) {
  const orig = window[fn];
  if (typeof orig === "function") window[fn] = function (pi, hi, li) { if (PLAY_TRACK) PLAY_TRACK[pi].add(G.players[pi].hand[hi]); return orig(pi, hi, li); };
}
const _playSpell = window.playSpell;
if (typeof _playSpell === "function") window.playSpell = async function (pi, hi) { if (PLAY_TRACK) PLAY_TRACK[pi].add(G.players[pi].hand[hi]); return _playSpell.apply(null, arguments); };

function harvestLogs(logArr) {
  for (const l of logArr) {
    for (const c of DB.cards) {
      if (!l.msg.includes(c.name)) continue;
      const s = stats.perCard[c.id];
      const isPlay = new RegExp("(plays|casts|attaches|sets) [^.]*" + c.name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).test(l.msg)
        || new RegExp(c.name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + " (attacks|attack)").test(l.msg);
      if (isPlay) s.played++;
      else s.mentions++;
    }
  }
}

/* ---------- realm lineup variety: distinct quads, doubles, mono, wildcard ---------- */
function pickRealms() {
  const all = realmNames().slice();
  for (let i = all.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [all[i], all[j]] = [all[j], all[i]]; }
  const roll = Math.random();
  if (roll < 0.5) return all.slice(0, 4);                                   // 4 distinct realms
  if (roll < 0.75) return [all[0], all[0], all[1], all[2]];                 // one doubled
  if (roll < 0.9) return [all[0], all[0], all[0], all[0]];                  // mono
  const a = [];                                                             // anything goes
  while (a.length < 4) a.push(all[Math.floor(Math.random() * all.length)]);
  return a;
}

/* ---------- AI ability usage (the built-in AI never activates once-per-turn abilities,
   so the Lab fires affordable ones at the start of each AI turn to exercise those cards) ---------- */
async function aiUseAbilities() {
  const pi = 1, P = G.players[pi];
  for (const t of heroesOf(pi)) {
    const h = heroAt(t);
    if (!h) continue;
    const f = fx(h.cardId);
    for (let i = 0; i < (f.activated || []).length; i++) {
      const ab = f.activated[i];
      if (ab.ops && P.pulse >= ab.cost + 3) await activateAbility(pi, t.li, h, cardById(h.cardId).name, ab, "lab-h" + i);
    }
    for (const r of h.relics) {
      const rf = fx(r.cardId);
      for (let i = 0; i < (rf.activated || []).length; i++) {
        const ab = rf.activated[i];
        if (ab.ops && P.pulse >= ab.cost + 3) await activateAbility(pi, t.li, r, cardById(r.cardId).name, ab, "lab-r" + i, r);
      }
    }
  }
  for (let li = 0; li < P.lanes.length; li++) {
    const seenA = new Set();
    for (const a of P.lanes[li].aux) if (a && !seenA.has(a.uid)) {
      seenA.add(a.uid);
      const af = fx(a.cardId);
      for (let i = 0; i < (af.auxActivated || []).length; i++) {
        const ab = af.auxActivated[i];
        if (ab.ops && P.pulse >= ab.cost + 3) await activateAbility(pi, li, a, cardById(a.cardId).name, ab, "lab-a" + i);
      }
    }
  }
}

/* ---------- self-play games ---------- */
async function playGames(n) {
  freshStats();
  // staged effect check first, folded into the same report
  $("progress").textContent = "Staged effect check…";
  await new Promise(r => origTimeout(r, 0));
  try { stats.staged = (await runSmokeTest()) || []; } catch (e) { stats.staged = [["(smoke test)", "runner", "crashed: " + e.message]]; }
  for (let g = 0; g < n; g++) {
    $("progress").textContent = `Game ${g + 1} / ${n}…`;
    await new Promise(r => origTimeout(r, 0));
    try {
      newGame({ playerRealms: pickRealms(), aiRealms: pickRealms(), difficulty: "medium", first: Math.random() < 0.5 ? 0 : 1 });
      G.players.forEach((p, i) => { p.isAI = true; p.labIdx = i; });
      const trackByIdx = [new Set(), new Set()];
      let guard = 0;
      while (!G.over && G.gt < 80 && guard++ < 200) {
        if (G.active === 0) { G.players.reverse(); G.active = 1; G.firstPlayer = 1 - G.firstPlayer; }
        PLAY_TRACK = [trackByIdx[G.players[0].labIdx], trackByIdx[G.players[1].labIdx]];
        await aiUseAbilities();
        if (!G.over) await aiTakeTurn();
      }
      PLAY_TRACK = null;
      harvestLogs(G.log);
      if (G.over) {
        const winIdx = G.players[G.winner].labIdx;
        for (let p = 0; p < 2; p++) {
          const won = p === winIdx;
          for (const id of trackByIdx[p]) { const s = stats.perCard[id]; if (s) { s.games++; if (won) s.wins++; } }
          const pl = G.players.find(x => x.labIdx === p);
          for (const r of new Set(pl.realms)) { stats.realms[r].games++; if (won) stats.realms[r].wins++; }
        }
      }
      stats.games++;
    } catch (e) {
      PLAY_TRACK = null;
      const last = (G && G.log.length) ? G.log[G.log.length - 1].msg : "(no log)";
      stats.crashes.push({ err: String(e && e.message || e), after: last, stack: String(e && e.stack || "").split("\n")[1] || "" });
    }
  }
  $("progress").textContent = `Done — ${stats.games} games completed, ${stats.crashes.length} crashed.`;
  renderReport();
}

/* ---------- report ---------- */
function pct(w, g) { return g ? Math.round(100 * w / g) : 0; }
function renderReport() {
  const played = Object.values(stats.perCard).filter(s => s.played > 0);
  const suspects = [];
  for (const c of DB.cards) {
    const s = stats.perCard[c.id];
    if (s.played >= 3 && s.mentions === 0 && !silentByNature(c)) suspects.push(s);
  }
  suspects.sort((a, b) => b.played - a.played);
  const staged = stats.staged || [];
  // cross-reference: a "suspect" whose staged check passed is almost certainly situational,
  // not broken — its scripted effect fired correctly in the controlled test.
  const stagedFailNames = new Set(staged.map(i => i[0]));
  const confirmed = suspects.filter(s => stagedFailNames.has(s.name));
  const watchlist = suspects.filter(s => !stagedFailNames.has(s.name));
  const brokenCount = confirmed.length + staged.length + (stats.crashes.length ? 1 : 0);

  // viability: winrate when played, minimum sample
  const MIN_G = 8;
  const rated = Object.values(stats.perCard).filter(s => s.games >= MIN_G);
  const weak = rated.filter(s => pct(s.wins, s.games) <= 35).sort((a, b) => pct(a.wins, a.games) - pct(b.wins, b.games));
  const strong = rated.filter(s => pct(s.wins, s.games) >= 65).sort((a, b) => pct(b.wins, b.games) - pct(a.wins, a.games));
  const untested = Object.values(stats.perCard).filter(s => s.games === 0).length;

  $("summary").innerHTML = `
    <div class="stat"><div class="n">${stats.games}</div><div class="l">games played</div></div>
    <div class="stat"><div class="n">${DB.cards.length - untested} / ${DB.cards.length}</div><div class="l">cards exercised</div></div>
    <div class="stat"><div class="n ${brokenCount ? "bad" : "ok"}">${brokenCount ? brokenCount : "0"}</div><div class="l">effects not working</div></div>
    <div class="stat"><div class="n ${weak.length ? "warn" : "ok"}">${weak.length}</div><div class="l">possibly too weak</div></div>
    <div class="stat"><div class="n ${strong.length ? "warn" : "ok"}">${strong.length}</div><div class="l">possibly too strong</div></div>`;

  let html = "";

  /* ---- 1. EFFECTS NOT WORKING ---- */
  html += `<section><h2 class="${brokenCount ? "bad" : "ok"}">${brokenCount ? "Effects not working" : "Effects: everything worked"}</h2>
    <p class="sub">Combined from three detectors: staged per-card checks, live-game telemetry, and crashes.</p>`;
  if (staged.length) html += `<h3 style="font-size:13px;margin:10px 0 4px;">Staged check findings (effect fired but did nothing / wrong numbers)</h3>
    <table><tr><th>Card</th><th>Part</th><th>Finding</th></tr>` +
    staged.map(i => `<tr><td>${esc(i[0])}</td><td>${esc(i[1])}</td><td>${esc(i[2])}</td></tr>`).join("") + "</table>";
  if (confirmed.length) html += `<h3 style="font-size:13px;margin:10px 0 4px;" class="bad">Confirmed broken (failed the staged check AND silent in games)</h3>
    <table><tr><th>Card</th><th>Realm</th><th>Type</th><th>Times played</th></tr>` +
    confirmed.map(s => `<tr><td>${esc(s.name)}</td><td>${esc(s.realm)}</td><td>${esc(s.type)}</td><td>${s.played}</td></tr>`).join("") + "</table>";
  html += "</section>";
  html += `<section><h2 class="${watchlist.length ? "warn" : "ok"}">Watch list — no verdict yet</h2>
    <p class="sub">These were played but their trigger condition never came up in these games (e.g. a "when attacked" Hero that was never attacked). Their staged check PASSED, so the effect itself works — they are listed only so you can eyeball them during your own play. This list shrinks as you run more games.</p>`;
  if (watchlist.length) html += `<table><tr><th>Card</th><th>Realm</th><th>Type</th><th>Times played</th></tr>` +
    watchlist.map(s => `<tr><td>${esc(s.name)}</td><td>${esc(s.realm)}</td><td>${esc(s.type)}</td><td>${s.played}</td></tr>`).join("") + "</table>";
  if (stats.crashes.length) {
    const grouped = {};
    for (const cr of stats.crashes) { const k = cr.err; grouped[k] = grouped[k] || { n: 0, after: cr.after, stack: cr.stack }; grouped[k].n++; }
    html += `<h3 style="font-size:13px;margin:10px 0 4px;" class="bad">Crashes (the last log line shows which card acted right before)</h3>
      <table><tr><th>Error</th><th>Times</th><th>Last log line</th><th>Where</th></tr>` +
      Object.entries(grouped).map(([k, v]) => `<tr><td class="bad">${esc(k)}</td><td>${v.n}</td><td>${esc(v.after)}</td><td class="muted">${esc(v.stack)}</td></tr>`).join("") + "</table>";
  }
  html += "</section>";

  /* ---- 2. NON-VIABLE / OVERPERFORMING CARDS ---- */
  html += `<section><h2 class="${weak.length ? "warn" : "ok"}">${weak.length ? "Possibly non-viable cards" : "No clearly non-viable cards yet"}</h2>
    <p class="sub">Cards whose owner won ≤35% of games in which the card was played (minimum ${MIN_G} games). AI decks are semi-random, so treat this as a shortlist for your own judgment, not a verdict — the more games, the more reliable.</p>`;
  if (weak.length) html += `<table><tr><th>Card</th><th>Realm</th><th>Type</th><th>Winrate when played</th><th>Games</th></tr>` +
    weak.map(s => `<tr><td>${esc(s.name)}</td><td>${esc(s.realm)}</td><td>${esc(s.type)}</td><td class="warn">${pct(s.wins, s.games)}%</td><td>${s.games}</td></tr>`).join("") + "</table>";
  if (strong.length) html += `<h3 style="font-size:13px;margin:12px 0 4px;">Possibly too strong (winrate ≥65% when played)</h3>
    <table><tr><th>Card</th><th>Realm</th><th>Type</th><th>Winrate when played</th><th>Games</th></tr>` +
    strong.map(s => `<tr><td>${esc(s.name)}</td><td>${esc(s.realm)}</td><td>${esc(s.type)}</td><td class="warn">${pct(s.wins, s.games)}%</td><td>${s.games}</td></tr>`).join("") + "</table>";
  html += "</section>";

  /* ---- 3. REALM BALANCE ---- */
  const realmRows = Object.entries(stats.realms).filter(([, v]) => v.games > 0).sort((a, b) => pct(b[1].wins, b[1].games) - pct(a[1].wins, a[1].games));
  html += `<section><h2>Realm balance</h2><p class="sub">Winrate of decks containing each Realm (lineups vary: distinct quads, doubled, mono). 45–55% is healthy; persistent outliers deserve a look.</p>
    <table><tr><th>Realm</th><th>Winrate</th><th>Deck appearances</th></tr>` +
    realmRows.map(([r, v]) => { const p = pct(v.wins, v.games); const cls = p >= 58 || p <= 42 ? "warn" : "ok"; return `<tr><td>${esc(r)}</td><td class="${cls}">${p}%</td><td>${v.games}</td></tr>`; }).join("") + "</table></section>";

  /* ---- 4. COVERAGE ---- */
  html += `<section><h2>Coverage</h2><p class="sub">${untested} cards were never drawn-and-played across these games. Nothing is wrong with them — they just haven't been exercised yet. Run more games to cover everything.</p></section>`;
  $("report").innerHTML = html;
}

/* ---------- staged effect check (smoke test) ---------- */
async function stagedCheck() {
  $("progress").textContent = "Running staged effect check on every card…";
  await new Promise(r => origTimeout(r, 0));
  let issues;
  try { issues = await runSmokeTest(); } catch (e) { $("progress").textContent = "Staged check crashed: " + e.message; return; }
  issues = issues || [];
  $("progress").textContent = `Staged check done — ${issues.length} findings.`;
  const html = `<section><h2 class="${issues.length ? "warn" : "ok"}">${issues.length ? issues.length + " staged findings" : "Staged check: every card's scripted effect produced its expected result"}</h2>
    <p class="sub">Each card was placed into a controlled board and its compiled effect fired directly; a finding means the effect produced no state change or the wrong stat totals.</p>` +
    (issues.length ? `<table><tr><th>Card</th><th>Part</th><th>Finding</th></tr>` +
      issues.map(i => `<tr><td>${esc(i[0])}</td><td>${esc(i[1])}</td><td>${esc(i[2])}</td></tr>`).join("") + "</table>" : "") + "</section>";
  $("report").innerHTML = html + $("report").innerHTML;
}

$("btn-run").onclick = async () => { $("btn-run").disabled = $("btn-smoke").disabled = true; await playGames(Math.max(1, +$("n-games").value || 60)); $("btn-run").disabled = $("btn-smoke").disabled = false; };
$("btn-smoke").onclick = async () => { $("btn-run").disabled = $("btn-smoke").disabled = true; await stagedCheck(); $("btn-run").disabled = $("btn-smoke").disabled = false; };
</script>
</body>
</html>
